name: ci-cd

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
      
      - name: Setup node
        uses: actions/setup-node@v4
      
      - name: Install Depe
        run: npm install
      
      - name: Build React Project
        run: npm run build
